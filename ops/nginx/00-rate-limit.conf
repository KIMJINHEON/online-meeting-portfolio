# Shared rate limit zone for admin login
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;

# Limit chat message submissions by IP (POST only).
# Empty key means no rate-limit accounting (used for non-POST requests).
map $request_method $chat_post_limit_key {
  default "";
  POST $binary_remote_addr;
}
limit_req_zone $chat_post_limit_key zone=chat_post:10m rate=40r/m;

# Return 429 instead of 503 when rate limit triggers
limit_req_status 429;

server {
  listen 80;
  listen [::]:80;
  server_name meeting.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name meeting.example.com;

  ssl_certificate     /etc/ssl/wildcard_streamon_co_kr__bundle.pem;
  ssl_certificate_key /etc/ssl/wildcard_streamon_co_kr__rsa.key;

  client_max_body_size 100m;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self), fullscreen=(self)" always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  # Serve the production build (do not proxy to Vite dev server in prod).
  root /opt/meeting/frontend/dist;
  index index.html;

  # Admin login rate limit
  location = /api/admin/login {
    limit_req zone=admin_login burst=20 nodelay;
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Chat message submit rate limit (POST only via map key)
  location = /api/chat/messages {
    limit_req zone=chat_post burst=20 nodelay;
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Roster upload can take longer for large/complex Excel parsing.
  location = /api/admin/roster/upload {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /live/ {
    proxy_pass http://127.0.0.1:1935;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Vite outputs hashed assets under /assets. Cache them aggressively.
  location /assets/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Multi-page build: ensure admin entry is served as a file.
  location = /admin.html {
    try_files /admin.html =404;
  }

  # Viewer is a single-page app. Let deep-links fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
